<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreedilyDone | Login</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="page">
  <div class="auth-container">

    <section class="form-side">

      <div class="brand">
        <img src="GD_LOGO.png" alt="GreedilyDone Logo" class="brand-logo-img">
        <h2><span>Greedily</span>Done</h2>
      </div>

      <h1>Welcome back!</h1>

      <p class="subtitle">
        Organize your workflow and finish tasks faster<br>
        with <span>GreedilyDone.</span>
      </p>

      <form>
        <div class="input-box">
          <i class="fa-regular fa-user left-icon"></i>
          <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
          <i class="fa-solid fa-lock left-icon"></i>
          <input type="password" placeholder="Password">
          <i class="fa-regular fa-eye right-icon"></i>
        </div>

        <a href="#" class="forgot">Forgot Password?</a>

        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="divider">
        <span></span>
        <p>or continue with</p>
        <span></span>
      </div>

      <div class="socials">
        <button class="google"><i class="fa-brands fa-google"></i></button>
        <button class="apple"><i class="fa-brands fa-apple"></i></button>
        <button class="facebook"><i class="fa-brands fa-facebook-f"></i></button>
      </div>

      <p class="bottom-text">
        Not a member? <a href="signup.html">Register now</a>
      </p>

    </section>

    <section class="image-side">
      <img src="right_pic.png" alt="Workspace" class="right-image">

      <div class="caption">
        <h2>Make your work easier<br>and organized</h2>
        <p>with <span>GreedilyDone</span></p>
      </div>

      <div class="slider">
        <span class="active"></span>
        <span></span>
        <span></span>
      </div>
    </section>

  </div>
</main>

</body>
</html>
