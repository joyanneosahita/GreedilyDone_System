<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreedilyDone | Sign Up</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page login-page">
    <div class="auth-container">

      <section class="form-side">
        <div class="brand">
           <img src="GD_LOGO.png" alt="GreedilyDone Logo" class="brand-logo-img">
           <h2><span>Greedily</span>Done</h2>
        </div>

        <h1>Create account</h1>
        <p class="subtitle">
          Start organizing your workflow faster<br>
          with <span>GreedilyDone.</span>
        </p>

        <form>
          <div class="input-box">
            <i class="fa-regular fa-user left-icon"></i>
            <input type="text" placeholder="Full Name">
          </div>

          <div class="input-box">
            <i class="fa-regular fa-envelope left-icon"></i>
            <input type="email" placeholder="Email Address">
          </div>

          <div class="input-box">
            <i class="fa-regular fa-user left-icon"></i>
            <input type="text" placeholder="Username">
          </div>

          <div class="input-box">
            <i class="fa-solid fa-lock left-icon"></i>
            <input type="password" placeholder="Password">
            <i class="fa-regular fa-eye right-icon"></i>
          </div>

          <button type="submit" class="login-btn signup-main">Register</button>
        </form>

        <div class="divider">
          <span></span>
          <p>or sign up with</p>
          <span></span>
        </div>

        <div class="socials">
          <button class="google"><i class="fa-brands fa-google"></i></button>
          <button><i class="fa-brands fa-apple"></i></button>
          <button class="facebook"><i class="fa-brands fa-facebook-f"></i></button>
        </div>

        <p class="bottom-text signup-bottom">
          Already have an account? <a href="login.html">Login now</a>
        </p>
      </section>

      <!-- REPLACE THE WHOLE RIGHT SIDE IN signup.html WITH THIS -->

      <section class="image-side">

          <img src="right_pic.png" alt="Workspace" class="right-image">

            <div class="caption">
            <h2>Build better habits<br>and finish tasks</h2>
             <p>with <span>GreedilyDone</span></p>
          </div>

          <div class="slider">
            <span class="active"></span>
            <span></span>
            <span></span>
          </div>

          </section>

    </div>
  </main>

</body>
</html>
